# zensical.toml
# 将 Material for MkDocs 迁移到 Zensical 的配置文件
# 提供基本网站信息、导航结构及主题样式设置

[project]
# 基本信息
site_name = "The PastWithin"  # 网站标题
site_description = "The PastWithin 的站点"  # 网站描述，用于 SEO
site_author = "The PastWithin"  # 网站作者信息
copyright = """Copyright © 2025 The PastWithin"""  # 网站版权信息
repo_url = "https://github.com/Pastwithin/Pastwithin-Zensical"  # 代码仓库链接
repo_name = "Pastwithin-Zensical"  # 代码仓库名称显示
extra_css = [
    "assets/css/extra.css",
    "https://unpkg.com/katex@0/dist/katex.min.css",
    "stylesheets/extra.css"
]  # 自定义 CSS 路径
extra_javascript = [
    "javascripts/katex.js",
    "https://unpkg.com/katex@0/dist/katex.min.js",
    "https://unpkg.com/katex@0/dist/contrib/auto-render.min.js"
    #"assets/javascripts/extra.js"
]  # 自定义 JavaScript 路径
# ----------------------------------------------------------------------------
# [主题配置] - 核心部分
[project.theme]
font.text = "Roboto"  # 正文字体
font.code = "JetBrains-Mono"  # 代码字体
# 使用 Zensical 的现代主题或传统主题选择
variant = "modern"  # 默认设置为现代风格
language = "zh"  # 设置网站语言为中文
features = [    #功能拓展
    "navigation.tabs",        # 启用标签导航
    "navigation.tabs.sticky", # 导航栏吸顶
    "navigation.top",         # 顶部导航
    "navigation.footer",    # 分节导航
    "search.highlight",       # 搜索高亮
    "search.suggest",        # 搜索建议
    "content.code.copy",    # 代码复制按钮
    "content.tabs",         # 内容标签
    "content.code.select",  # 代码选择功能
    "content.tooltips",     # 内容工具提示
]
# ----------------------------------------------------------------------------
logo = "assets/images/github.png"  # 页面 Logo 图标（GitHub 图标）
favicon = "assets/images/favicon.ico"  # 网站 favicon（路径相对于项目）
[project.theme.icon]
repo = "fontawesome/brands/git-alt"  # 仓库图标设置为 GitHub 图标
# ----------------------------------------------------------------------------
# [导航配置]
[[project.theme.palette]]
# 浅色模式配置
scheme = "default"
primary = "black"  # 主色调 - 黑色
accent = "blue"  # 强调色 - 蓝色
[project.theme.palette.toggle]
icon = "lucide/sun"  # 浅色模式切换图标
name = "切换到深色模式"

[[project.theme.palette]]
# 深色模式配置
scheme = "slate"
primary = "grey"  # 主色调 - 灰色
accent = "black"  # 强调色 - 黑色
[project.theme.palette.toggle]
icon = "lucide/moon"  # 深色模式切换图标
name = "切换到浅色模式"

# 数学公式渲染配置
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
# ----------------------------------------------------------------------------
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.abbr]

# ----------------------------------------------------------------------------
# 导航栏配置
[[project.nav]]
"首页" = [
    { "主页" = "index.md" },
    { "网站介绍" = "homepage/网站介绍.md" }
]

[[project.nav]]
"工具" = [
    { "VPN和Github Copilot" = "guide/VPN&&Github Copilot/VPN&&Github Copilot.md" },
    { "Markdown" = [
        {"Markdown基础语法" = "guide/Markdown基础语法/Markdown基础语法.md"},
        {"Markdown表格语法" = "guide/Markdown表格语法/Markdown表格语法.md"},
    ] },
]
[[project.nav]]
"学习笔记" = [
    { "常微分方程" = "notes/常微分方程/常微分方程.md" }
]

[[project.nav]]
"文章" = [
    { "一点点回忆（还在写）" = "passages/一点点回忆（还在写）.md" },
    { " 总结 "= "passages/总结.md" }
]

[[project.nav]]
"更新日志" = [
    { "更新日志" = "changelog/changelog.md" }
]
